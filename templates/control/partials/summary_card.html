<div class="col-12 col-lg-4">
    <div class="content-card p-3 h-100">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h2 class="h5 mb-0">{{ title }}</h2>
            <span class="badge {% if data.ready %}text-bg-success{% else %}text-bg-secondary{% endif %}">{{ data.percent }}%</span>
        </div>
        <div class="progress mb-3" style="height: 0.6rem;">
            <div class="progress-bar" style="width: {{ data.percent }}%"></div>
        </div>
        <div class="row g-2 small">
            <div class="col-6">Ожидается: <strong>{{ data.expected }}</strong></div>
            <div class="col-6">Создано: <strong>{{ data.created }}</strong></div>
            <div class="col-6">Отсутствует: <strong>{{ data.missing }}</strong></div>
            <div class="col-6">Черновик: <strong>{{ data.draft }}</strong></div>
            {% if show_partial %}
                <div class="col-6">Частично: <strong>{{ data.partially_submitted }}</strong></div>
            {% endif %}
            <div class="col-6">Отправлена: <strong>{{ data.submitted }}</strong></div>
            <div class="col-6">Готово: <strong>{{ data.ready_count }}</strong></div>
        </div>
    </div>
</div>

{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="content-card p-4">
            <h1 class="h4 mb-3">{{ title }}</h1>
            <p>Удалить запись <strong>{{ object }}</strong>?</p>
            <form method="post">
                {% csrf_token %}
                <button class="btn btn-danger" type="submit">Удалить</button>
                <a class="btn btn-outline-secondary" href="{% url back_url %}">Отмена</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}

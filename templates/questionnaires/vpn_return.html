{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="content-card p-4">
            <h1 class="h4 mb-3">{{ title }}</h1>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                        {{ field }}
                        {% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
                    </div>
                {% endfor %}
                <button class="btn btn-outline-danger" type="submit">Вернуть</button>
                <button class="btn btn-outline-secondary" type="button" onclick="history.back()">Назад</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
